---
# Agent Task: Assign IPs from NetBox to VLAN interfaces
# Goal:
#   Update the Ansible playbook to dynamically fetch IPs and VLAN interfaces for device ID 1 from NetBox,
#   and assign the IPs to the corresponding VLAN interfaces on the local host.
#
# Constraints:
#   - Use non-persistent IP assignment (ip addr add).
#   - Use Ansible only.
#   - Assume VLAN interfaces (e.g., enp1s0.2008) already exist.
#   - Dynamically map child interfaces from NetBox to VLAN interfaces on the host.
#
# Validation:
#   After running the playbook, verify with:
#     ip addr show enp1s0.2008 | grep "10.2.223.10"
#     ip addr show enp1s0.2000 | grep "10.2.223.2"
#     ping 10.2.223.10
#     ping 10.2.223.2
#
# Notes:
#   - Do NOT include TCP simulation, persistence, or logging.
#   - Ensure the playbook is idempotent and handles missing or duplicate IPs gracefully.

- name: Assign IPs from NetBox to VLAN interfaces
  hosts: localhost
  connection: local
  vars:
    netbox_url: "http://10.100.66.48:8000"
    netbox_token: "RUmeVgksKcgogMd7tn5TrkIphBEGrQEUKibOmayQ"
    device_id: 1
    trunk_interface: "enp1s0"
    test_mode: false  # Set to true to run in test mode without making changes

  tasks:
    # Fetch all interfaces for the device from NetBox
    - name: Get all interfaces for device
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/dcim/interfaces/?device_id={{ device_id }}"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
          Accept: "application/json"
        validate_certs: no
        return_content: yes
        status_code: 200
      register: device_interfaces
      changed_when: false
      failed_when: device_interfaces.status != 200

    # Display the fetched interfaces for debugging
    - name: Display fetched interfaces (debug)
      ansible.builtin.debug:
        var: device_interfaces.json.results
      when: test_mode

    # Extract trunk interface
    - name: Find trunk interface
      ansible.builtin.set_fact:
        trunk_if: "{{ (device_interfaces.json.results | selectattr('name', 'equalto', trunk_interface) | first) if device_interfaces.json.results else {} }}"
      failed_when: trunk_if == {}

    # Display the trunk interface for debugging
    - name: Display trunk interface (debug)
      ansible.builtin.debug:
        var: trunk_if
      when: test_mode

    # Fetch all child interfaces of the trunk interface
    - name: Get child interfaces of trunk
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/dcim/interfaces/?parent_id={{ trunk_if.id }}"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
          Accept: "application/json"
        validate_certs: no
        return_content: yes
        status_code: 200
      register: child_interfaces
      changed_when: false
      when: trunk_if.id is defined
      failed_when: child_interfaces.status != 200

    # Display child interfaces for debugging
    - name: Display child interfaces (debug)
      ansible.builtin.debug:
        var: child_interfaces.json.results
      when: test_mode

    # Fetch IPs for each child interface
    - name: Get IP addresses for child interfaces
      ansible.builtin.uri:
        url: "{{ netbox_url }}/api/ipam/ip-addresses/?interface_id={{ item.id }}"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
          Accept: "application/json"
        validate_certs: no
        return_content: yes
        status_code: 200
      register: ip_results
      loop: "{{ child_interfaces.json.results | default([]) }}"
      loop_control:
        label: "Fetching IPs for interface {{ item.name }}"
      changed_when: false
      when: child_interfaces.json.results is defined and child_interfaces.json.results|length > 0
      failed_when: false

    # Display IP results for debugging
    - name: Display IP results (debug)
      ansible.builtin.debug:
        var: ip_results.results
      when: test_mode

    # Build list of IPs with their VLAN IDs for assignment
    - name: Build IP to VLAN mapping
      ansible.builtin.set_fact:
        ip_vlan_mappings: "{% set temp_list = [] %}{% for result in ip_results.results %}{% set child = child_interfaces.json.results[loop.index0] %}{% set tagged_vlans = child.tagged_vlans | default([]) %}{% if tagged_vlans|length > 0 %}{% set vlan_id = tagged_vlans[0].vid %}{% else %}{% set vlan_id = child.id %}{% endif %}{% for ip in result.json.results | default([]) %}{% set addr = ip.address | default('') %}{% if addr and addr != '' %}{% set addr_parts = addr.split('/') %}{% set address = addr_parts[0] %}{% set prefix_length = addr_parts[1] | default(24) | int %}{% set _ = temp_list.append({'address': address, 'prefix_length': prefix_length, 'vlan_id': vlan_id, 'child_name': child.name, 'interface_name': trunk_interface ~ '.' ~ vlan_id}) %}{% endif %}{% endfor %}{% endfor %}{{ (temp_list | unique(attribute='address')) | to_json | from_json }}"
      when: ip_results.results is defined and ip_results.results|length > 0

    # Display the IP to VLAN mappings for debugging
    - name: Display IP to VLAN mappings (debug)
      ansible.builtin.debug:
        var: ip_vlan_mappings
      when: test_mode

    # Test: Show what would be removed without actually removing
    - name: Test - Show IPs that would be removed
      ansible.builtin.shell: |
        # Only check VLAN interfaces ({{ trunk_interface }}.*)
        current_ips=$(ip -o addr show | grep "{{ trunk_interface }}\." | awk '{print $4}' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+$')
        echo "The following IPs would be checked for removal:"
        for ip in $current_ips; do
          if ! echo "{{ ip_vlan_mappings | map(attribute='address') | join('/') }}" | grep -q "${ip%%/*}"; then
            echo "Would remove $ip from $(ip -o addr show | grep $ip | awk '{print $2}')"
          else
            echo "Would keep $ip (found in NetBox)"
          fi
        done
      when: test_mode and ip_vlan_mappings is defined and ip_vlan_mappings|length > 0
      changed_when: false

    # Remove any existing IPs on VLAN interfaces that are not in our mapping
    - name: Remove IPs not in NetBox from VLAN interfaces
      ansible.builtin.shell: |
        # Only check VLAN interfaces (enp1s0.*)
        current_ips=$(ip -o addr show | grep "{{ trunk_interface }}\." | awk '{print $4}' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+$')
        for ip in $current_ips; do
          if ! echo "{{ ip_vlan_mappings | map(attribute='address') | join('/') }}" | grep -q "${ip%%/*}"; then
            echo "Removing $ip as it's not in NetBox"
            ip addr del $ip dev $(ip -o addr show | grep $ip | awk '{print $2}') || true
          fi
        done
      when: not test_mode and ip_vlan_mappings is defined and ip_vlan_mappings|length > 0
      changed_when: false

    # Test: Show what would be assigned without actually assigning
    - name: Test - Show IPs that would be assigned
      ansible.builtin.debug:
        msg: "Would assign IP {{ item.address }}/{{ item.prefix_length }} to {{ item.interface_name }}"
      loop: "{{ ip_vlan_mappings | default([]) }}"
      loop_control:
        label: "{{ item.address }}/{{ item.prefix_length }} → {{ item.interface_name }}"
      when: test_mode and ip_vlan_mappings is defined and ip_vlan_mappings|length > 0

    # Bring up VLAN interfaces if they're not up
    - name: Bring up VLAN interfaces
      ansible.builtin.shell: |
        if ip link show {{ item }} | grep -q "state UP"; then
          echo "Interface {{ item }} is already up"
          exit 0
        else
          ip link set {{ item }} up
          exit 0
        fi
      loop: "{{ ip_vlan_mappings | map(attribute='interface_name') | unique | list }}"
      loop_control:
        label: "Bringing up {{ item }}"
      when: not test_mode and ip_vlan_mappings is defined and ip_vlan_mappings|length > 0
      register: if_up_result
      changed_when: "'already up' not in if_up_result.results[loop.index0].stdout"
      ignore_errors: yes

    # Assign IPs to VLAN interfaces
    - name: Assign IP to VLAN interface
      ansible.builtin.shell: |
        if ip addr show {{ item.interface_name }} | grep -q "{{ item.address }}"; then
          echo "IP {{ item.address }} already assigned to {{ item.interface_name }}"
          exit 0
        else
          ip addr add {{ item.address }}/{{ item.prefix_length }} dev {{ item.interface_name }}
          exit 0
        fi
      loop: "{{ ip_vlan_mappings | default([]) }}"
      loop_control:
        label: "{{ item.address }}/{{ item.prefix_length }} → {{ item.interface_name }}"
      when: not test_mode and ip_vlan_mappings is defined and ip_vlan_mappings|length > 0
      register: ip_assignment_result
      changed_when: "'already assigned' not in ip_assignment_result.results[loop.index0].stdout"
      ignore_errors: yes

    # Validate IP assignments
    - name: Validate IP assignments
      ansible.builtin.shell: |
        if ip addr show {{ item.interface_name }} | grep -q "{{ item.address }}"; then
          echo "Validated: {{ item.address }} on {{ item.interface_name }}"
          exit 0
        else
          echo "Missing: {{ item.address }} on {{ item.interface_name }}"
          exit 1
        fi
      loop: "{{ ip_vlan_mappings | default([]) }}"
      loop_control:
        label: "Validating {{ item.address }} on {{ item.interface_name }}"
      register: validation_result
      changed_when: false
      when: not test_mode and ip_vlan_mappings is defined and ip_vlan_mappings|length > 0
      ignore_errors: yes

    # Test connectivity to assigned IPs
    - name: Test connectivity to assigned IPs
      ansible.builtin.shell: |
        ping -c 1 -W 1 {{ item.address }} > /dev/null 2>&1
      loop: "{{ ip_vlan_mappings | default([]) }}"
      loop_control:
        label: "Testing connectivity to {{ item.address }}"
      register: ping_result
      changed_when: false
      when: ip_vlan_mappings is defined and ip_vlan_mappings|length > 0
      ignore_errors: yes

    # Display connectivity test results
    - name: Display connectivity test results
      ansible.builtin.debug:
        msg: "Ping to {{ item.item.address }} {{ 'succeeded' if item.rc == 0 else 'failed' }}"
      loop: "{{ ping_result.results | default([]) }}"
      loop_control:
        label: "{{ item.item.address }}"
      when: ip_vlan_mappings is defined and ip_vlan_mappings|length > 0

    # Summary
    - name: Display summary
      ansible.builtin.debug:
        msg: |
          === IP Assignment Summary ===
          {% if test_mode %}
          Mode: TEST (no changes made)
          {% else %}
          Mode: LIVE (changes applied)
          {% endif %}
          
          Device: {{ device_interfaces.json.results[0].device.display if device_interfaces.json.results else 'Unknown' }}
          Trunk Interface: {{ trunk_if.name | default('Unknown') }}
          
          {% if ip_vlan_mappings is defined %}
          IPs to assign: {{ ip_vlan_mappings | length }}
          {% for mapping in ip_vlan_mappings %}
          - {{ mapping.address }}/{{ mapping.prefix_length }} → {{ mapping.interface_name }} (VLAN {{ mapping.vlan_id }})
          {% endfor %}
          
          {% if ip_assignment_result is defined %}
          IP assignments: {{ ip_assignment_result.results | selectattr('changed', 'equalto', true) | length }} changed, {{ ip_assignment_result.results | selectattr('changed', 'equalto', false) | length }} unchanged
          {% endif %}
          
          {% if ping_result is defined %}
          Connectivity tests: {{ ping_result.results | selectattr('rc', 'equalto', 0) | length }} succeeded, {{ ping_result.results | selectattr('rc', 'equalto', 1) | length }} failed
          {% endif %}
          {% else %}
          No IP mappings found
          {% endif %}
      when: ip_vlan_mappings is defined
