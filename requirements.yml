---
# Ansible Collection Requirements for Debian Trixie
# Compatible with Ansible 2.19.4 + Python 3.13.5
#
# Install with: ansible-galaxy collection install -r requirements.yml

collections:
  - name: netbox.netbox
    version: ">=3.0.0"
    # Official NetBox collection for Ansible
    # Documentation: https://galaxy.ansible.com/netbox/netbox

# To install:
#   ansible-galaxy collection install -r requirements.yml
#
# To verify:
#   ansible-galaxy collection list | grep netbox
#   ansible-doc -t inventory netbox.netbox.netbox
