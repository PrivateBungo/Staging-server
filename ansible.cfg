[defaults]
# Ansible Configuration File
# This file configures Ansible behavior for the NetBox integration

# Inventory configuration
# Use the new inventory.yml for NetBox dynamic inventory
# Or use inventory.ini for static inventory
# inventory = inventory.yml

# For backward compatibility, we keep inventory.ini as default
# but you can override with -i inventory.yml on command line
inventory = inventory.ini

# Enable inventory plugins (required for netbox.netbox collection)
[inventory]
enable_plugins = netbox.netbox.netbox, constructed, host_list, script, yaml, ini, auto

# Connection settings
[connectivity]
# Use local connection for localhost
# Use ssh for remote hosts

# Privilege escalation
[privilege_escalation]
become_method = sudo

# Logging
[logging]
# Uncomment to enable logging
# log_path = /var/log/ansible.log

# SSH settings
[ssh_connection]
# Uncomment for better SSH performance
# ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ControlPath=/tmp/ansible-ssh-%h-%p-%r

# Retry files
[retry_files]
enabled = False

# Display
[display]
# Show more verbose output
# verbosity = 2

# For using the netbox.netbox collection, you need to:
# 1. Install the collection: ansible-galaxy collection install netbox.netbox
# 2. Install pynetbox: pip install pynetbox (or apt install python3-pynetbox on Debian)
# 3. Set NETBOX_TOKEN environment variable
# 4. Use -i inventory.yml when running playbooks
