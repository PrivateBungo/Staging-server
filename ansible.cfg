[defaults]
# Ansible Configuration for NetBox Integration
# Compatible with Ansible 2.19.4 + Python 3.13.5 on Debian Trixie

# Inventory configuration
inventory = inventory.yml

# Collection paths
collections_paths = ~/.ansible/collections:/usr/share/ansible/collections

# Python interpreter
interpreter_python = auto_silent

# Retry files
enable_multithreading = true

[inventory]
# Enable inventory plugins - CORRECT plugin name is netbox.netbox.nb_inventory
enable_plugins = netbox.netbox.nb_inventory, yaml, ini, auto, constructed

[privilege_escalation]
become_method = sudo

[ssh_connection]
# SSH settings for better performance
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ControlPath=/tmp/ansible-ssh-%h-%p-%r

# For troubleshooting, uncomment:
# [logging]
# log_path = /var/log/ansible.log
