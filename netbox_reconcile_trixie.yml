---
# NetBox Reconciliation Playbook for Debian Trixie
# Uses official netbox.netbox collection with Ansible 2.19.4
#
# This playbook:
# 1. Fetches device configuration from NetBox using official collection modules
# 2. Reconciles VLAN interfaces on the local host
# 3. Reconciles IP addresses on VLAN interfaces
# 4. Generates persistent configuration
#
# Usage:
#   ansible-playbook -i inventory.yml netbox_reconcile_trixie.yml --check  # Dry run
#   ansible-playbook -i inventory.yml netbox_reconcile_trixie.yml          # Live run
#
# Prerequisites:
#   - Ansible 2.19.4+ (you have this on Trixie ✅)
#   - netbox.netbox collection installed
#   - pynetbox installed: sudo apt install -y python3-pynetbox
#   - NETBOX_TOKEN environment variable set (optional, falls back to hardcoded)

- name: NetBox reconciliation using official collection (Debian Trixie)
  hosts: localhost
  connection: local
  gather_facts: false
  
  vars:
    # Device configuration
    device_name: "staging-server"
    trunk_interface: "enp1s0"
    
    # Persistence - uses ~/.netbox_reconcile by default (no sudo needed)
    # Can be overridden with PERSISTENCE_DIR environment variable
    persistence_dir: "{{ lookup('env', 'PERSISTENCE_DIR') | default(lookup('env', 'HOME') + '/.netbox_reconcile', true) }}"
    tcp_sim_config: "{{ persistence_dir }}/tcp_services.json"
    network_config: "{{ persistence_dir }}/network-config.sh"
  
  tasks:
    # ========================================================================
    # FETCH DATA FROM NETBOX USING OFFICIAL COLLECTION
    # Note: Using ansible.builtin.uri instead of info modules which don't exist
    # If NetBox is not available, we'll use empty defaults and skip reconciliation
    # ========================================================================
    
    - name: Get device information from NetBox
      ansible.builtin.uri:
        url: "http://10.100.66.48:8000/api/dcim/devices/?name={{ device_name }}"
        method: GET
        headers:
          Authorization: "Token {{ lookup('env', 'NETBOX_TOKEN') | default('RUmeVgksKcgogMd7tn5TrkIphBEGrQEUKibOmayQ', true) }}"
          Accept: "application/json"
        validate_certs: no
        return_content: yes
      register: nb_device
      changed_when: false
      ignore_errors: yes
      
    - name: Display device info
      ansible.builtin.debug:
        var: nb_device.json.results
      when: nb_device.json.results is defined and nb_device.json.results | length > 0
      
    - name: Get all interfaces for the device
      ansible.builtin.uri:
        url: "http://10.100.66.48:8000/api/dcim/interfaces/?device={{ device_name }}"
        method: GET
        headers:
          Authorization: "Token {{ lookup('env', 'NETBOX_TOKEN') | default('RUmeVgksKcgogMd7tn5TrkIphBEGrQEUKibOmayQ', true) }}"
          Accept: "application/json"
        validate_certs: no
        return_content: yes
      register: nb_interfaces
      changed_when: false
      ignore_errors: yes
      when: nb_device.status == 200
      
    - name: Find trunk interface
      ansible.builtin.set_fact:
        trunk_if: "{{ (nb_interfaces.json.results | selectattr('name', 'equalto', trunk_interface) | first) if nb_interfaces.json.results is defined and nb_interfaces.json.results else {} }}"
      
    - name: Get child interfaces (VLAN sub-interfaces) of trunk
      ansible.builtin.uri:
        url: "http://10.100.66.48:8000/api/dcim/interfaces/?parent_id={{ trunk_if.id }}"
        method: GET
        headers:
          Authorization: "Token {{ lookup('env', 'NETBOX_TOKEN') | default('RUmeVgksKcgogMd7tn5TrkIphBEGrQEUKibOmayQ', true) }}"
          Accept: "application/json"
        validate_certs: no
        return_content: yes
      register: nb_child_interfaces
      changed_when: false
      ignore_errors: yes
      when: trunk_if.id is defined
      
    - name: Get IP addresses for child interfaces
      ansible.builtin.uri:
        url: "http://10.100.66.48:8000/api/ipam/ip-addresses/?interface_id={{ item.id }}"
        method: GET
        headers:
          Authorization: "Token {{ lookup('env', 'NETBOX_TOKEN') | default('RUmeVgksKcgogMd7tn5TrkIphBEGrQEUKibOmayQ', true) }}"
          Accept: "application/json"
        validate_certs: no
        return_content: yes
      register: nb_ip_addresses
      loop: "{{ nb_child_interfaces.json.results | default([]) }}"
      loop_control:
        label: "Fetching IPs for interface {{ item.name }}"
      changed_when: false
      ignore_errors: yes
      when: nb_child_interfaces.json.results is defined and nb_child_interfaces.json.results | length > 0
    
    # ========================================================================
    # EXTRACT AND PROCESS DATA
    # ========================================================================
    
    - name: Set device fact
      ansible.builtin.set_fact:
        device: "{{ (nb_device.json.results | first) if nb_device.json.results else {} }}"
      
    - name: Extract VLAN IDs from child interfaces
      ansible.builtin.set_fact:
        nb_vlan_ids: >-
          {% set all_vlans = [] %}
          {% for iface in nb_child_interfaces.json.results | default([]) %}
          {% set tagged_vlans = iface.tagged_vlans | default([]) %}
          {% for vlan in tagged_vlans %}
          {% set _ = all_vlans.append(vlan.vid) %}
          {% endfor %}
          {% endfor %}
          {{ all_vlans | unique | sort | list }}
      
    - name: Extract IP data from child interfaces
      ansible.builtin.set_fact:
        nb_ip_data: >-
          {% set all_ips = [] %}
          {% for result in nb_ip_addresses.results | default([]) %}
          {% set child_iface = nb_child_interfaces.json.results[loop.index0] %}
          {% set vlan_ids = (child_iface.tagged_vlans | map(attribute='vid') | list) if child_iface.tagged_vlans else [] %}
          {% for ip in result.json.results | default([]) %}
          {% set services = (ip.custom_fields | dict2items | selectattr('key', 'equalto', 'service_port') | first).value if ip.custom_fields and 'service_port' in ip.custom_fields else '' %}
          {% set _ = all_ips.append({
            'interface': child_iface.name,
            'vlan': vlan_ids[0] if vlan_ids | length > 0 else None,
            'address': ip.address,
            'services': services
          }) %}
          {% endfor %}
          {% endfor %}
          {{ all_ips }}
      
    - name: Display extracted configuration
      ansible.builtin.debug:
        msg: |
          Device: {{ device.display | default('Unknown') }}
          Trunk Interface: {{ trunk_if.name | default('Unknown') }}
          VLANs from NetBox: {{ nb_vlan_ids | default([]) }}
          IP Data: {{ nb_ip_data | default([]) | length }} addresses
          {% for ip in nb_ip_data | default([]) %}
          - {{ ip.address }} on {{ ip.interface }} (VLAN {{ ip.vlan }}){% if ip.services %} - Services: {{ ip.services }}{% endif %}
          {% endfor %}
    
    # ========================================================================
    # GET CURRENT HOST CONFIGURATION
    # ========================================================================
    
    - name: Ensure persistence directory exists
      ansible.builtin.file:
        path: "{{ persistence_dir }}"
        state: directory
        mode: '0755'
      
    - name: Get current VLAN IDs on host
      ansible.builtin.command: python3 get_vlan_ids.py {{ trunk_interface }}
      register: host_vlan_raw
      changed_when: false
      ignore_errors: yes
      
    - name: Set host VLAN IDs fact
      ansible.builtin.set_fact:
        host_vlan_ids: "{{ host_vlan_raw.stdout | from_json | default([]) }}"
      
    - name: Check if trunk interface exists on this host
      ansible.builtin.command: "ip link show {{ trunk_interface }}"
      register: if_check
      ignore_errors: yes
      changed_when: false
    
    # ========================================================================
    # RECONCILE VLAN INTERFACES
    # ========================================================================
    
    - name: Create VLAN interfaces that exist in NetBox but not on host
      ansible.builtin.command: "ip link add link {{ trunk_interface }} name {{ trunk_interface }}.{{ item }} type vlan id {{ item }}"
      loop: "{{ nb_vlan_ids | difference(host_vlan_ids | default([])) | list }}"
      when: 
        - nb_vlan_ids | length > 0
        - if_check.rc == 0
      register: vlan_created
      changed_when: vlan_created.rc == 0
      ignore_errors: yes
      become: yes
      
    - name: Remove VLAN interfaces that exist on host but not in NetBox
      ansible.builtin.command: "ip link del {{ trunk_interface }}.{{ item }}"
      loop: "{{ (host_vlan_ids | default([])) | difference(nb_vlan_ids) | list }}"
      when: 
        - host_vlan_ids | length > 0
        - if_check.rc == 0
      register: vlan_removed
      changed_when: vlan_removed.rc == 0
      ignore_errors: yes
      become: yes
      
    - name: Bring up all VLAN interfaces
      ansible.builtin.command: "ip link set {{ trunk_interface }}.{{ item }} up"
      loop: "{{ nb_vlan_ids }}"
      when: 
        - nb_vlan_ids | length > 0
        - if_check.rc == 0
      register: vlan_up
      changed_when: vlan_up.rc == 0
      ignore_errors: yes
      become: yes
    
    # ========================================================================
    # RECONCILE IP ADDRESSES
    # ========================================================================
    
    - name: Configure IP addresses on VLAN interfaces
      ansible.builtin.command: >-
        ip addr add {{ item.address }}/{{ item.address.split('/')[-1] if '/' in item.address else '24' }} dev {{ trunk_interface }}.{{ item.vlan }}
      loop: "{{ nb_ip_data }}"
      when: 
        - nb_ip_data | length > 0
        - if_check.rc == 0
        - (trunk_interface + '.' + item.vlan|string) in (host_vlan_ids | default([]))
      register: ip_configured
      changed_when: ip_configured.rc == 0
      ignore_errors: yes
      become: yes
    
    # ========================================================================
    # GENERATE PERSISTENT CONFIGURATION
    # ========================================================================
    
    - name: Generate network configuration script
      ansible.builtin.copy:
        dest: "{{ network_config }}"
        mode: '0755'
        content: |
          #!/bin/bash
          # Auto-generated by NetBox reconciliation (Trixie) - {{ ansible_date_time.iso8601 }}
          TRUNK_IF="{{ trunk_interface }}"
          
          # Bring up trunk interface
          ip link set $TRUNK_IF up 2>/dev/null
          
          # Create and configure VLAN interfaces
          {% for vlan_id in nb_vlan_ids %}
          ip link add link $TRUNK_IF name $TRUNK_IF.{{ vlan_id }} type vlan id {{ vlan_id }} 2>/dev/null || true
          ip link set $TRUNK_IF.{{ vlan_id }} up 2>/dev/null || true
          {% endfor %}
          
          # Configure IP addresses
          {% for ip_info in nb_ip_data %}
          CIDR="{{ ip_info.address.split('/')[-1] if '/' in ip_info.address else '24' }}"
          ip addr add {{ ip_info.address }}/$CIDR dev $TRUNK_IF.{{ ip_info.vlan }} 2>/dev/null || true
          {% endfor %}
      
    - name: Register network config as a service for persistence
      ansible.builtin.systemd:
        name: netbox-network
        state: started
        enabled: yes
        scope: system
      register: systemd_result
      ignore_errors: yes
      become: yes
      
    - name: Generate TCP service simulation configuration
      ansible.builtin.copy:
        dest: "{{ tcp_sim_config }}"
        mode: '0644'
        content: |
          {
            "services": [
              {% for ip_info in nb_ip_data %}
              {% if ip_info.services %}
              {% for service in ip_info.services.split(',') %}
              {
                "ip": "{{ ip_info.address.split('/')[0] }}",
                "port": {{ service.split('-')[1] | int }},
                "protocol": "{{ service.split('-')[0] }}",
                "banner": "Service {{ service }} on {{ ip_info.address.split('/')[0] }}"
              }{% if not loop.last %},{% endif %}
              {% endfor %}
              {% endif %}
              {% endfor %}
            ]
          }
      when: nb_ip_data | selectattr('services', 'defined') | select('services') | list | length > 0
    
    # ========================================================================
    # SUMMARY
    # ========================================================================
    
    - name: Display reconciliation summary
      ansible.builtin.debug:
        msg: |
          ============================================
          NetBox Reconciliation Summary (Trixie + Official Collection)
          ============================================
          
          Device: {{ device.display | default('Unknown') }}
          Trunk Interface: {{ trunk_if.name | default('Unknown') }}
          
          NetBox VLANs: {{ nb_vlan_ids | default([]) }}
          Host VLANs (before): {{ host_vlan_ids | default([]) }}
          
          Actions:
          {% set created = vlan_created.results | selectattr('changed', 'equalto', true) | map(attribute='item') | list %}
          {% set removed = vlan_removed.results | selectattr('changed', 'equalto', true) | map(attribute='item') | list %}
          {% set uplifted = vlan_up.results | selectattr('changed', 'equalto', true) | map(attribute='item') | list %}
          {% set ips_set = ip_configured.results | selectattr('changed', 'equalto', true) | map(attribute='item.address') | list %}
          
          {% if created %}
          Created VLAN interfaces: {{ created }}
          {% else %}
          Created VLAN interfaces: None
          {% endif %}
          {% if removed %}
          Removed VLAN interfaces: {{ removed }}
          {% else %}
          Removed VLAN interfaces: None
          {% endif %}
          {% if uplifted %}
          Brought up VLAN interfaces: {{ uplifted }}
          {% else %}
          Brought up VLAN interfaces: None
          {% endif %}
          {% if ips_set %}
          Configured IPs: {{ ips_set }}
          {% else %}
          Configured IPs: None
          {% endif %}
          
          Persistence:
          - Network config: {{ network_config }}
          - TCP services config: {{ tcp_sim_config }}
          
          ============================================
          Status: Host VLANs and IPs now match NetBox
          ============================================
